services:
  - type: web
    name: interlev-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: interlev-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: interlev-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: interlev-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHONPATH
        value: .
      - key: BACKEND_URL
        value: https://interlev-backend.onrender.com
      - key: PUBLIC_BACKEND_URL
        value: https://interlev-backend.onrender.com

  - type: worker
    name: interlev-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A backend.app.tasks.celery_app worker --loglevel=info --pool=solo
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: interlev-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: interlev-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: redis
    name: interlev-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: interlev-postgres
    plan: free
